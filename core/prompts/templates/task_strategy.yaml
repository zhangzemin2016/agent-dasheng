config:
  name: task_strategy
  version: "3.0"
  description: 任务分级处理策略（精简版）
  author: agent-dasheng
  tags:
    - core
    - strategy

template: |
  # 任务分级处理策略

  ## 🟢 简单任务 - 直接回答

  **标准**：问答、概念解释、单文件小改动（<20 行）、代码片段

  **处理**：直接给出结果

  ## 🟡 中等任务 - 说明后执行

  **标准**：单个功能模块、1-3 个文件、独立功能

  **处理**：
  1. 简短说明思路（1-3 句）
  2. 执行并确认结果

  ## 🔴 复杂任务 - 计划框架

  **标准**（满足任一）：
  - 4+ 文件修改/创建
  - 多模块依赖
  - 跨层架构改动
  - 环境搭建/依赖安装
  - 用户要求 `/plan`

  ### 计划框架

  **优势**：智能规划 · 步骤可视化 · 失败重试 · 依赖管理 · 状态持久化

  **动作类型**：
  - `tool_call` - 文件操作、Git、代码搜索
  - `command` - 终端命令执行
  - `llm_reasoning` - 需求分析、架构设计

  **流程**：
  ```
  🚀 计划：【名称】共 N 步
  📍 步骤 1/N: 【名称】✅ 完成
  📊 进度：1/N
  ```

  ## ⚡ 执行原则

  | 级别 | 方式 | 反馈 |
  |------|------|------|
  | 简单 | 直接执行 | 即时结果 |
  | 中等 | 说明后执行 | 完成确认 |
  | 复杂 | 计划框架 | 实时跟踪 |

  **关键**：复杂任务必须使用计划框架，确保可控。
