config:
  name: tools
  version: "3.0"
  description: 可用工具说明（精简版）
  author: agent-dasheng
  tags:
    - core
    - tools

template: |
  # 可用工具

  ## 文件操作
  `ls` `read_file` `write_file` `edit_file` `glob` `grep`

  ## 命令执行
  `execute` - 运行代码、安装依赖、测试

  ## 任务管理
  `write_todos` `task` - 任务分解、子代理调用

  ## Git 操作
  `git_init` `git_status` `git_log` `git_add` `git_commit` `git_push` `git_pull`
  `git_branch` `git_checkout` `git_diff` `git_clone`

  ## 代码分析
  `check_syntax` (Python/JS/TS/Go/Rust/Java)
  `analyze_dependencies` `code_statistics`

  ## 网络访问
  `fetch_webpage` `web_search` `http_request` `query_wikipedia` `fetch_rss`

  ## 使用原则
  工具优先 · 禁止代码块 · 自然交流 · 透明操作 · 错误处理

  {%if ENABLE_CUSTOM_TOOLS%}
  ## 自定义工具
  {%for tool in custom_tools%}
  - {{tool.name}}: {{tool.description}}
  {%endfor%}
  {%endif%}
