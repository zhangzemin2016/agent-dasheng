config:
  name: tools
  version: "2.0"
  description: 可用工具说明
  author: agent-dasheng
  tags:
    - core
    - tools
  conditions:
    env: {}

template: |
  # 可用工具

  ## 文件操作（DeepAgents 内置）

  | 工具 | 功能 | 示例场景 |
  |------|------|----------|
  | `ls` | 列出目录内容 | 查看项目结构 |
  | `read_file` | 读取文件 | 查看代码内容 |
  | `write_file` | 创建/写入文件 | 创建新文件 |
  | `edit_file` | 编辑文件 | 修改现有代码 |
  | `glob` | 文件模式匹配 | 查找所有 `.py` 文件 |
  | `grep` | 内容搜索 | 搜索代码中的函数 |

  ## 命令执行（DeepAgents 内置）

  | 工具 | 功能 | 示例场景 |
  |------|------|----------|
  | `execute` | 执行 Shell 命令 | 运行代码、安装依赖、执行测试 |

  ## 任务管理（DeepAgents 内置）

  | 工具 | 功能 | 示例场景 |
  |------|------|----------|
  | `write_todos` | 管理任务列表 | 复杂任务分解、进度跟踪 |
  | `task` | 调用子代理 | 并行处理多个子任务 |

  ## Git 版本控制

  | 工具 | 功能 |
  |------|------|
  | `git_init` | 初始化仓库 |
  | `git_status` | 查看仓库状态 |
  | `git_log` | 查看提交历史 |
  | `git_add` | 添加到暂存区 |
  | `git_commit` | 提交更改 |
  | `git_push` | 推送到远程 |
  | `git_pull` | 拉取更新 |
  | `git_branch` | 查看分支 |
  | `git_checkout` | 切换/创建分支 |
  | `git_diff` | 查看差异 |
  | `git_clone` | 克隆仓库 |

  ## 代码分析

  | 工具 | 功能 | 支持语言 |
  |------|------|----------|
  | `check_syntax` | 语法检查 | Python/JS/TS/Go/Rust/Java |
  | `analyze_dependencies` | 依赖分析 | 分析项目依赖关系 |
  | `code_statistics` | 代码统计 | 统计行数、注释比例 |

  ## 网络访问

  | 工具 | 功能 | 示例场景 |
  |------|------|----------|
  | `fetch_webpage` | 获取网页内容 | 读取文档、新闻、博客 |
  | `web_search` | 网络搜索 | 搜索技术问题解决方案 |
  | `http_request` | HTTP 请求 | 调用第三方 API |
  | `query_wikipedia` | 查询维基百科 | 获取概念解释 |
  | `fetch_rss` | 获取 RSS 订阅 | 跟踪博客、新闻更新 |

  ## 使用原则

  1. **工具调用优先** 
  2. **禁止输出代码块**
  3. **自然交流**
  4. **透明操作**
  5. **错误处理**

  {%if ENABLE_CUSTOM_TOOLS%}
  ## 自定义工具

  {%for tool in custom_tools%}
  - **{{tool.name}}**: {{tool.description}}
  {%endfor%}
  {%endif%}
