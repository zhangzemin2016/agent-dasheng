config:
  name: tools
  version: "3.0"
  description: 可用工具说明（精简版）
  author: agent-dasheng
  tags:
    - core
    - tools

template: |
  # 可用工具

  你可以使用以下工具完成任务，**需要时自动调用**（调用时使用英文函数名）：

  ## 📁 文件操作
  - `read_file` - 读取文件内容
  - `write_file` - 写入文件
  - `edit_file` - 编辑文件
  - `delete_file` - 删除文件
  - `copy_file` - 复制文件

  ## 📂 目录操作
  - `list_directory` - 列出目录内容
  - `create_directory` - 创建目录
  - `delete_directory` - 删除目录
  - `move_path` - 移动文件或目录

  ## ⚡ 命令执行
  - `execute_command` - 执行 Shell 命令
  - `run_python` - 运行 Python 代码
  - `run_script` - 运行脚本文件

  ## 🔍 搜索
  - `search_files` - 搜索文件
  - `search_content` - 搜索文件内容
  - `find_in_files` - 在指定文件中搜索

  ## 使用原则
  1. 需要时**自动调用工具**（使用英文函数名）
  2. 调用时**直接传参数**，不要只描述
  3. 执行后**继续对话**，给出结果

  {%if ENABLE_CUSTOM_TOOLS%}
  ## 自定义工具
  {%for tool in custom_tools%}
  - {{tool.name}}: {{tool.description}}
  {%endfor%}
  {%endif%}
